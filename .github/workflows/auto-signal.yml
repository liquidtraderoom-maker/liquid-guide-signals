name: Liquid Guide Auto Signal

on:
  schedule:
    - cron: '0 13 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  post-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Find and run signal script
        run: |
          echo "📂 Repo structure:"
          find . -name "*.cjs" -o -name "package.json" | grep -v node_modules | grep -v ".git"
          PKG=$(find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/.git/*" | head -1)
          DIR=$(dirname "$PKG")
          echo "📦 Found package.json in: $DIR"
          cd "$DIR"
          npm install
          SCRIPT=$(find . -name "auto-signal.cjs" | head -1)
          echo "🚀 Running: $SCRIPT"
          node "$SCRIPT"
        env:
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY:     ${{ secrets.SERVICE_KEY }}
          ANTHROPIC_KEY:   ${{ secrets.ANTHROPIC_KEY }}
          METALS_KEY:      ${{ secrets.METALS_KEY }}
          ONESIGNAL_APP:   ${{ secrets.ONESIGNAL_APP }}
          ONESIGNAL_KEY:   ${{ secrets.ONESIGNAL_KEY }}
